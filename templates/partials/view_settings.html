<!-- ── SETTINGS VIEW ─────────────────────────────────────────────────── -->
<div id="view-settings" class="view p-4 space-y-4 fade-in">
  <h2 class="text-xl font-bold text-[#191c1d]">Settings</h2>

  <!-- Appearance -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm space-y-3">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider">Appearance</div>
    <div class="flex items-center justify-between">
      <div>
        <div class="text-sm font-semibold text-[#191c1d]">Dark Mode</div>
        <p class="text-xs text-[#44474a] mt-0.5">Switch to a darker color scheme</p>
      </div>
      <div id="dark-toggle" class="toggle-track" onclick="toggleDarkMode()">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  </div>

  <!-- Preferences link -->
  <button onclick="showView('preferences')"
          class="w-full bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm flex items-center justify-between hover:bg-[#f8f9fa] transition-colors">
    <div class="text-left">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-0.5">Preferences</div>
      <div class="text-sm text-[#191c1d]">Currency &amp; custom currencies</div>
    </div>
    <svg class="w-4 h-4 text-[#44474a] flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- Budgets link -->
  <button onclick="showView('budgets')"
          class="w-full bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm flex items-center justify-between hover:bg-[#f8f9fa] transition-colors">
    <div class="text-left">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-0.5">Budgets</div>
      <div class="text-sm text-[#191c1d]">Monthly budget &amp; custom event/category budgets</div>
    </div>
    <svg class="w-4 h-4 text-[#44474a] flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- Categories link -->
  <button onclick="showView('categories')"
          class="w-full bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm flex items-center justify-between hover:bg-[#f8f9fa] transition-colors">
    <div class="text-left">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-0.5">Categories</div>
      <div class="text-sm text-[#191c1d]">Manage categories, merchant rules &amp; AI model</div>
    </div>
    <svg class="w-4 h-4 text-[#44474a] flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- Recurring Expenses link -->
  <button onclick="showView('recurring')"
          class="w-full bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm flex items-center justify-between hover:bg-[#f8f9fa] transition-colors">
    <div class="text-left">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-0.5">Recurring Expenses</div>
      <div class="text-sm text-[#191c1d]">Auto-add monthly expenses on the 1st</div>
    </div>
    <svg class="w-4 h-4 text-[#44474a] flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- Payment Methods link -->
  <button onclick="showView('payment-methods')"
          class="w-full bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm flex items-center justify-between hover:bg-[#f8f9fa] transition-colors">
    <div class="text-left">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-0.5">Payment Methods</div>
      <div class="text-sm text-[#191c1d]">Add or remove payment methods</div>
    </div>
    <svg class="w-4 h-4 text-[#44474a] flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- Export / Import -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm space-y-3">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider">Data Backup</div>
    <p class="text-xs text-[#44474a]">Download a backup of your expenses or restore from a previous one.</p>
    <div class="grid grid-cols-2 gap-2">
      <button onclick="exportJSON()"
              class="py-2.5 border border-[#c5c6ca] text-[#191c1d] rounded-2xl font-semibold text-xs hover:bg-[#f8f9fa] transition-colors">
        ↓ Export JSON
      </button>
      <button onclick="exportCSV()"
              class="py-2.5 border border-[#c5c6ca] text-[#191c1d] rounded-2xl font-semibold text-xs hover:bg-[#f8f9fa] transition-colors">
        ↓ Export CSV
      </button>
    </div>
    <button onclick="triggerImport()"
            class="w-full py-2.5 border border-[#6dfad2] text-[#006b55] rounded-2xl font-semibold text-xs hover:bg-[#f0fdf9] transition-colors">
      ↑ Import JSON backup
    </button>
    <input id="import-file" type="file" accept=".json" class="hidden" onchange="onImportFile(event)" />
  </div>

</div>
