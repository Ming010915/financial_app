<!-- ── VERIFY VIEW ─────────────────────────────────────────────────── -->
<div id="view-verify" class="view fade-in">

  <!-- Header -->
  <div class="px-4 pt-4 pb-3 flex items-center gap-3 flex-shrink-0 border-b border-[#edeeef]">
    <button onclick="cancelVerifyView()"
            class="w-8 h-8 flex items-center justify-center rounded-2xl bg-[#f8f9fa] text-[#44474a] hover:bg-[#e8e9ea] transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h2 class="text-xl font-bold text-[#191c1d]">Verify Receipt</h2>
  </div>

  <!-- Image panel (fixed height, pinch/drag to zoom) -->
  <div id="verify-img-panel" class="flex-shrink-0 overflow-hidden bg-[#edeeef] relative" style="height:42%; touch-action:none;">
    <img id="verify-img" src="" alt="Receipt" class="w-full h-full object-contain block"
         style="transform-origin:center center; will-change:transform; user-select:none; -webkit-user-drag:none;" />
    <div id="verify-pdf" class="hidden w-full h-full overflow-y-auto">
      <div id="verify-pdf-canvas-wrap" class="space-y-1"></div>
    </div>
    <!-- Zoom toggle -->
    <button id="verify-zoom-btn" onclick="toggleVerifyZoom()"
            class="absolute top-2 right-2 w-8 h-8 bg-black/50 rounded-full text-white flex items-center justify-center">
      <svg id="verify-zoom-icon-in"  class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0zm-6-3v6m-3-3h6"/></svg>
      <svg id="verify-zoom-icon-out" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0zm-3-3H8"/></svg>
    </button>
    <span id="verify-zoom-hint" class="absolute bottom-2 left-2 text-[10px] text-white/90 bg-black/40 px-2 py-0.5 rounded-full pointer-events-none">Pinch to zoom</span>
  </div>

  <!-- Divider label -->
  <div id="verify-divider" class="flex-shrink-0 px-4 py-1.5 bg-[#e6f4f1]">
    <span class="text-xs font-semibold text-[#006b55]">AI extracted — tap any field to correct</span>
  </div>

  <!-- Error panel (shown instead of fields when image is not a receipt) -->
  <div id="verify-error-panel" class="hidden flex-1 flex flex-col items-center justify-center px-6 gap-5 text-center">
    <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center">
      <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
    </div>
    <div>
      <p class="text-base font-bold text-[#191c1d] mb-1">Not a receipt</p>
      <p id="verify-error-msg" class="text-sm text-[#44474a] leading-relaxed"></p>
    </div>
  </div>

  <!-- Editable fields -->
  <div id="verify-fields" class="flex-1 overflow-y-auto min-h-0 px-4 py-3 space-y-3">

    <div>
      <label class="block text-xs font-semibold text-[#44474a] mb-1">Merchant</label>
      <input id="v-merchant" type="text" autocomplete="off" placeholder="e.g. Lidl"
             class="w-full px-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
    </div>

    <div class="grid grid-cols-5 gap-2">
      <div class="col-span-2">
        <label class="block text-xs font-semibold text-[#44474a] mb-1">Total</label>
        <input id="v-total" type="number" min="0" step="0.01" placeholder="0.00"
               oninput="updateVerifyTotalHint()"
               class="w-full px-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        <p id="v-total-converted" class="hidden mt-1 text-xs text-gray-400"></p>
      </div>
      <div class="col-span-1">
        <label class="block text-xs font-semibold text-[#44474a] mb-1">CCY</label>
        <select id="v-currency" onchange="onVerifyCurrencyChange()"
                class="w-full px-1 py-2.5 border border-[#c5c6ca] rounded-2xl text-xs font-bold focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white text-center"></select>
      </div>
      <div class="col-span-2">
        <label class="block text-xs font-semibold text-[#44474a] mb-1">Date</label>
        <input id="v-date" type="date"
               class="w-full px-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
      </div>
    </div>

    <!-- Items list -->
    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-[#44474a]">Items <span id="v-items-count" class="text-[#006b55]"></span></span>
        <button type="button" onclick="addVerifyItem()"
                class="text-xs font-semibold text-[#006b55] hover:text-[#004d3f] flex items-center gap-1 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Add item
        </button>
      </div>
      <div class="flex items-center gap-2 mb-1 px-1">
        <span class="flex-1 text-[10px] text-[#44474a]">Name</span>
        <span class="w-12 text-[10px] text-[#44474a] text-center">Qty</span>
        <span class="w-24 text-[10px] text-[#44474a] text-right pr-1">Price</span>
        <span class="w-7"></span>
      </div>
      <div id="v-items-list" class="space-y-2"></div>
    </div>

  </div>

  <!-- Confirm button -->
  <div id="verify-confirm-row" class="flex-shrink-0 px-4 py-3 border-t border-[#edeeef]">
    <button onclick="confirmVerify()"
            class="w-full py-3.5 bg-[#006b55] hover:bg-[#004d3f] active:bg-[#003d31] text-white rounded-2xl font-bold text-sm transition-colors shadow-sm flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Looks good — Continue
    </button>
  </div>

  <!-- Error action row (shown instead of confirm when not a receipt) -->
  <div id="verify-error-action-row" class="hidden flex-shrink-0 px-4 py-3 border-t border-[#edeeef]">
    <button onclick="dismissAndScanNew()"
            class="w-full py-3.5 bg-[#006b55] hover:bg-[#004d3f] active:bg-[#003d31] text-white rounded-2xl font-bold text-sm transition-colors shadow-sm flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Scan a new receipt
    </button>
  </div>

</div>
