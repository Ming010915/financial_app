<!-- ── PAYMENT METHODS VIEW ─────────────────────────────────────────── -->
<div id="view-payment-methods" class="view p-4 space-y-4 fade-in">
  <div class="flex items-center gap-3">
    <button onclick="showView('settings')"
            class="w-8 h-8 flex items-center justify-center rounded-2xl bg-[#f8f9fa] text-[#44474a] hover:bg-[#e8e9ea] transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h2 class="text-xl font-bold text-[#191c1d]">Payment Methods</h2>
  </div>

  <div id="payment-methods-list" class="bg-white rounded-3xl border border-[#e8e9ea] shadow-sm divide-y divide-[#e8e9ea] overflow-hidden"></div>

  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm space-y-3">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider">Add Payment Method</div>
    <div class="flex gap-2">
      <input id="new-payment-emoji" type="text" placeholder="💳"
             class="w-12 flex-shrink-0 px-1 py-2.5 border border-[#c5c6ca] rounded-2xl text-xl text-center bg-white focus:outline-none focus:ring-2 focus:ring-[#006b55]" />
      <input id="new-payment-method" type="text" placeholder="e.g. PayPal, Cheque…"
             class="flex-1 min-w-0 px-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm text-[#191c1d] bg-white focus:outline-none focus:ring-2 focus:ring-[#006b55]" />
      <button onclick="addCustomPaymentMethod()"
              class="px-4 py-2.5 bg-[#006b55] hover:bg-[#004d3f] text-white rounded-2xl text-sm font-bold transition-colors">
        Add
      </button>
    </div>
    <p class="text-xs text-[#44474a]">Tap the emoji box to pick an emoji, then enter a payment method name.</p>
  </div>
</div>
