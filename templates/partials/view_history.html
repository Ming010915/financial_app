<!-- ── HISTORY VIEW ───────────────────────────────────────────────────── -->
<div id="view-history" class="view fade-in">
  <div class="p-4 pb-2 space-y-2.5">
    <div class="flex items-center justify-between">
      <h2 class="text-xl font-bold text-[#191c1d]">History</h2>
      <div class="flex items-center gap-2">
        <button id="history-view-toggle" onclick="toggleHistViewMode()"
                class="w-9 h-9 flex items-center justify-center rounded-2xl border border-[#e8e9ea] bg-white text-[#44474a] transition-colors">
          <svg id="hist-cal-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <svg id="hist-list-icon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- List mode controls -->
    <div id="history-list-controls" class="flex gap-2">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[#c5c6ca] pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
        <input id="history-search" type="text" placeholder="Search merchant or notes…"
               oninput="filterHistory()"
               class="w-full pl-9 pr-4 py-2.5 border border-[#e8e9ea] rounded-2xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#006b55] focus:border-transparent" />
      </div>
      <button onclick="openHistoryFilters()" id="history-filter-btn"
              class="relative flex-shrink-0 w-11 h-11 flex items-center justify-center rounded-2xl border border-[#e8e9ea] bg-white transition-colors">
        <svg class="w-4 h-4 text-[#44474a]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M7 10h10M11 16h2"/></svg>
        <span id="history-filter-badge" class="hidden absolute -top-1 -right-1 w-4 h-4 rounded-full bg-[#006b55] text-white text-[9px] font-bold flex items-center justify-center"></span>
      </button>
    </div>
    <!-- Calendar mode controls -->
    <div id="history-cal-controls" class="hidden flex items-center justify-between">
      <button onclick="calNavMonth(-1)" class="w-9 h-9 flex items-center justify-center rounded-2xl border border-[#e8e9ea] bg-white text-[#44474a]">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <span id="cal-month-label" class="text-sm font-bold text-[#191c1d]"></span>
      <button onclick="calNavMonth(1)" class="w-9 h-9 flex items-center justify-center rounded-2xl border border-[#e8e9ea] bg-white text-[#44474a]">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- List view -->
  <div id="history-list" class="p-4 pt-2 space-y-4">
    <div class="text-center text-[#c5c6ca] py-8">No expenses yet</div>
  </div>

  <!-- Calendar view -->
  <div id="history-calendar" class="hidden p-4">
    <div id="cal-grid"></div>
    <div id="history-day-detail"></div>
  </div>
</div>
