<!-- ── API KEYS VIEW ────────────────────────────────────────────────── -->
<div id="view-api-keys" class="view p-4 space-y-4 fade-in">
  <div class="flex items-center gap-3">
    <button onclick="showView('settings')"
            class="w-8 h-8 flex items-center justify-center rounded-2xl bg-[#f8f9fa] text-[#44474a] hover:bg-[#e8e9ea] transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h2 class="text-xl font-bold text-[#191c1d]">API Keys</h2>
  </div>

  <!-- Google AI Studio -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm space-y-3">
    <div class="flex items-center justify-between">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider">Google AI Studio</div>
      <span class="text-[10px] text-[#44474a]">Receipt scanning &amp; voice</span>
    </div>
    <div id="s-env-notice" class="hidden bg-emerald-50 border border-emerald-200 rounded-2xl px-3 py-2 text-xs text-emerald-700 font-medium">
      ✓ Loaded from <code>GOOGLE_API_KEY</code> env var
    </div>
    <div class="relative">
      <input id="s-api-key" type="password" autocomplete="off" spellcheck="false"
             placeholder="AIza…"
             onchange="saveApiKey()"
             class="w-full px-4 py-3 border border-[#c5c6ca] rounded-2xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white pr-12" />
      <button type="button" onclick="toggleApiVis()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-[#44474a] hover:text-[#191c1d] transition-colors">
        <svg id="eye-show" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        <svg id="eye-hide" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
      </button>
    </div>
    <div id="s-key-status" class="text-xs text-[#44474a]"></div>
    <p class="text-xs text-[#44474a]">Free key at <span class="text-[#006b55] font-medium">aistudio.google.com</span></p>
  </div>

  <!-- Google Maps Platform -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm space-y-3">
    <div class="flex items-center justify-between">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider">Google Maps Platform</div>
      <span class="text-[10px] text-[#44474a]">Location autocomplete</span>
    </div>
    <div class="relative">
      <input id="s-places-key" type="password" autocomplete="off" spellcheck="false"
             placeholder="AIza…"
             onchange="savePlacesApiKey()"
             class="w-full px-4 py-3 border border-[#c5c6ca] rounded-2xl text-sm font-mono focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white pr-12" />
      <button type="button" onclick="togglePlacesKeyVis()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-[#44474a] hover:text-[#191c1d] transition-colors">
        <svg id="places-eye-show" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        <svg id="places-eye-hide" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
      </button>
    </div>
    <div id="s-places-status" class="text-xs text-[#44474a]"></div>
    <p class="text-xs text-[#44474a]">Enable <em>Places API</em> at <span class="text-[#006b55] font-medium">console.cloud.google.com</span></p>
  </div>
</div>
