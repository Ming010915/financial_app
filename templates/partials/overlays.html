<!-- ── Toast ────────────────────────────────────────────────────────────────── -->
<div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-3xl shadow-xl text-sm font-semibold text-white text-center max-w-xs slide-up pointer-events-none"></div>

<!-- ── Confirm Dialog ────────────────────────────────────────────────────────── -->
<div id="confirm-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center px-6"
     style="background:rgba(0,0,0,0.45)">
  <div class="bg-white rounded-3xl shadow-xl w-full max-w-xs p-6 space-y-4 fade-in">
    <div class="text-base font-bold text-[#191c1d]" id="confirm-title"></div>
    <div class="text-sm text-[#44474a]" id="confirm-message"></div>
    <div class="grid grid-cols-2 gap-2 pt-1">
      <button onclick="confirmCancel()"
              class="py-2.5 rounded-2xl border border-[#c5c6ca] text-sm font-semibold text-[#44474a] hover:bg-[#f8f9fa] transition-colors">
        Cancel
      </button>
      <button id="confirm-ok"
              class="py-2.5 rounded-2xl text-sm font-semibold text-white transition-colors">
        Confirm
      </button>
    </div>
  </div>
</div>

<!-- ── Expense Detail Bottom Sheet ──────────────────────────────────────────── -->
<div id="detail-overlay" class="hidden fixed inset-0 z-40 flex items-end justify-center"
     style="background:rgba(0,0,0,0.5)">
  <div onclick="closeDetail()" class="absolute inset-0"></div>
  <div id="detail-sheet"
       class="relative w-full max-w-[430px] bg-white rounded-t-3xl z-10 sheet-up overflow-hidden"
       style="max-height:88vh; overflow-y:auto;">
    <div class="flex justify-center pt-3 pb-1 sticky top-0 bg-white z-10">
      <div class="w-10 h-1 bg-[#c5c6ca] rounded-full"></div>
    </div>
    <div class="px-5 pb-6 pt-2">

      <!-- ── VIEW MODE ────────────────────────────────────────────── -->
      <div id="det-view-mode">
        <div class="flex items-center justify-between mb-4">
          <div id="det-badge" class="px-3 py-1.5 rounded-full text-white text-xs font-bold"></div>
          <button onclick="closeDetail()"
                  class="w-7 h-7 rounded-full bg-[#f8f9fa] flex items-center justify-center text-[#44474a] hover:bg-[#e8e9ea] transition-colors text-sm font-bold">✕</button>
        </div>
        <div id="det-merchant" class="text-2xl font-bold text-[#191c1d] mb-1"></div>
        <div id="det-amount" class="text-3xl font-bold text-[#006b55] mb-5"></div>
        <div class="space-y-2.5 mb-5">
          <div class="flex items-center gap-3 text-sm text-[#44474a]">
            <span class="text-base">📅</span>
            <span id="det-date"></span>
          </div>
          <div id="det-payment-row" class="hidden flex items-center gap-3 text-sm text-[#44474a]">
            <span class="text-base" id="det-payment-icon">💳</span>
            <span id="det-payment"></span>
          </div>
          <div id="det-notes-row" class="hidden flex items-start gap-3 text-sm text-[#44474a]">
            <span class="text-base mt-0.5">📝</span>
            <span id="det-notes" class="leading-relaxed"></span>
          </div>
          <div id="det-location-row" class="hidden flex items-start gap-3 text-sm text-[#44474a]">
            <span class="text-base mt-0.5">📍</span>
            <span id="det-location" class="leading-relaxed"></span>
          </div>
          <div class="flex items-center gap-3 text-sm text-[#44474a]">
            <span class="text-base" id="det-source-icon">💳</span>
            <span id="det-source"></span>
          </div>
        </div>
        <div id="det-items-section" class="hidden mb-5">
          <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-2">Receipt Items</div>
          <div id="det-items-list" class="bg-[#f8f9fa] rounded-2xl p-3 space-y-1 text-sm text-[#191c1d] max-h-40 overflow-y-auto"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="openEdit()"
                  class="py-3 border border-[#6dfad2] text-[#006b55] rounded-2xl font-semibold text-sm hover:bg-[#f0fdf9] transition-colors">
            Edit
          </button>
          <button id="det-delete-btn"
                  class="py-3 border border-red-200 text-red-500 rounded-2xl font-semibold text-sm hover:bg-red-50 transition-colors">
            Delete
          </button>
        </div>
      </div>

      <!-- ── EDIT MODE ─────────────────────────────────────────────── -->
      <div id="det-edit-mode" class="hidden">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-base font-bold text-[#191c1d]">Edit Expense</h3>
          <button onclick="cancelEdit()"
                  class="w-7 h-7 rounded-full bg-[#f8f9fa] flex items-center justify-center text-[#44474a] hover:bg-[#e8e9ea] transition-colors text-sm font-bold">✕</button>
        </div>
        <!-- Merchant -->
        <div class="mb-3">
          <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">Merchant</label>
          <input id="edit-merchant" type="text"
                 class="w-full px-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        </div>
        <!-- Amount + Currency -->
        <div class="grid grid-cols-3 gap-2 mb-3">
          <div class="col-span-2">
            <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">Amount</label>
            <div class="relative">
              <span id="edit-cur-sym" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#44474a] text-sm font-semibold pointer-events-none">€</span>
              <input id="edit-amount" type="number" min="0" step="0.01"
                     class="w-full pl-7 pr-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
            </div>
          </div>
          <div>
            <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">CCY</label>
            <select id="edit-currency"
                    class="w-full px-1 py-2.5 border border-[#c5c6ca] rounded-2xl text-xs font-bold focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white text-center"
                    onchange="updateEditCurrencyRate(this.value)"></select>
          </div>
        </div>
        <!-- Exchange rate row -->
        <div id="edit-rate-row" style="display:none"
             class="items-center gap-2 bg-[#f0fdf9] border border-[#6dfad2] rounded-2xl px-3 py-2.5 mb-3">
          <span class="text-xs text-[#44474a] flex-shrink-0">1 <span id="edit-rate-from"></span> =</span>
          <span id="edit-rate-sym" class="text-xs font-semibold text-[#191c1d] flex-shrink-0"></span>
          <input id="edit-rate" type="number" step="any" min="0" placeholder="0.000000"
                 class="flex-1 min-w-0 px-2 py-1 border border-[#6dfad2] rounded-xl text-xs text-center focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
          <span id="edit-rate-note" class="text-[10px] text-emerald-500 flex-shrink-0"></span>
        </div>
        <!-- Date -->
        <div class="mb-3">
          <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">Date</label>
          <input id="edit-date" type="date"
                 class="w-full px-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        </div>
        <!-- Category -->
        <div class="mb-3">
          <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">Category</label>
          <div id="edit-cat-buttons" class="flex flex-wrap gap-1.5"></div>
        </div>
        <!-- Notes -->
        <div class="mb-3">
          <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">Notes</label>
          <input id="edit-notes" type="text" placeholder="Optional note"
                 class="w-full px-3 py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        </div>
        <!-- Location -->
        <div class="mb-3" id="edit-location-wrap">
          <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">Location</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#44474a] text-sm pointer-events-none">📍</span>
            <input id="edit-location" type="text" placeholder="Type or tap Near me…" autocomplete="off"
                   oninput="onLocationInput('edit-location', 'edit-nearby-results')"
                   class="w-full pl-9 pr-[5.5rem] py-2.5 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
            <button type="button" onclick="findNearbyPlaces('edit-location', 'edit-nearby-results', this)"
                    class="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-bold text-[#006b55] bg-[#f0fdf9] hover:bg-[#d0f5e8] px-2.5 py-1.5 rounded-xl transition-colors whitespace-nowrap">
              Near me
            </button>
          </div>
          <div id="edit-nearby-results"
               class="hidden mt-1 bg-white border border-[#c5c6ca] rounded-2xl shadow-lg overflow-hidden max-h-52 overflow-y-auto"></div>
        </div>
        <!-- Payment Method -->
        <div class="mb-3">
          <label class="text-xs font-semibold text-[#44474a] mb-1.5 block">Payment Method</label>
          <div id="edit-payment-buttons" class="flex flex-wrap gap-1.5"></div>
        </div>
        <!-- Items -->
        <div class="mb-4">
          <div class="flex items-center justify-between mb-2">
            <label class="text-xs font-semibold text-[#44474a]">Items</label>
            <button type="button" onclick="addEditItem()"
                    class="text-xs font-bold text-[#006b55] hover:text-[#004d3f] py-1 px-2 rounded-xl hover:bg-[#f0fdf9] transition-colors">+ Add item</button>
          </div>
          <div class="flex items-center gap-2 mb-1 px-1">
            <span class="flex-1 text-[10px] text-[#44474a]">Name</span>
            <span class="w-12 text-[10px] text-[#44474a] text-center">Qty</span>
            <span class="w-20 text-[10px] text-[#44474a] text-center">Price</span>
            <span class="w-7"></span>
          </div>
          <div id="edit-items-list" class="space-y-2"></div>
        </div>
        <!-- Buttons -->
        <div class="grid grid-cols-2 gap-3">
          <button onclick="cancelEdit()"
                  class="py-3 border border-[#c5c6ca] text-[#44474a] rounded-2xl font-semibold text-sm hover:bg-[#f8f9fa] transition-colors">
            Cancel
          </button>
          <button onclick="saveEdit()"
                  class="py-3 bg-[#006b55] text-white rounded-2xl font-semibold text-sm hover:bg-[#004d3f] transition-colors flex items-center justify-center gap-2">
            <span id="edit-save-label">Save Changes</span>
            <span id="edit-save-spinner" class="hidden loader"></span>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
