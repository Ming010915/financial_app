<!-- ── SUMMARY VIEW ──────────────────────────────────────────────────── -->
<div id="view-summary" class="view p-4 space-y-4 fade-in">
  <h2 class="text-xl font-bold text-[#191c1d]">Summary</h2>

  <!-- Stat cards -->
  <div class="grid grid-cols-2 gap-3">
    <div class="bg-[#006b55] rounded-3xl p-4 text-white shadow-sm">
      <div class="text-xs font-semibold opacity-70 mb-1">This Month</div>
      <div id="sum-month" class="text-2xl font-bold">—</div>
    </div>
    <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm">
      <div class="text-xs font-semibold text-[#44474a] mb-1">Today</div>
      <div id="sum-today" class="text-2xl font-bold text-[#191c1d]">—</div>
    </div>
  </div>

  <!-- Pie / Doughnut chart -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-3">Spending by Category</div>
    <div id="pie-wrap" class="flex items-center justify-center" style="height:220px;">
      <canvas id="pie-chart"></canvas>
    </div>
  </div>

  <!-- Daily bar/line chart -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-3">Last 7 Days</div>
    <div style="height:160px;">
      <canvas id="line-chart"></canvas>
    </div>
  </div>

  <!-- AI Overview Card -->
  <div id="ai-overview-card" class="bg-white rounded-3xl shadow-sm border border-[#e8e9ea] p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm font-bold text-[#191c1d]">✨ AI Insight</span>
      <button id="ai-overview-refresh" onclick="refreshAiOverview()" class="w-7 h-7 rounded-full flex items-center justify-center text-[#44474a] hover:bg-[#f0fdf9] hover:text-[#006b55] transition-colors" title="Refresh insight">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
    <p id="ai-overview-text" class="text-sm text-[#44474a] leading-relaxed"></p>
    <p id="ai-overview-based-on" class="text-[10px] text-[#c5c6ca] mt-2"></p>
  </div>
  
</div>
