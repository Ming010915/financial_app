<!-- ── ADD VIEW ──────────────────────────────────────────────────────── -->
<div id="view-add" class="view p-4 space-y-4 fade-in">
  <div class="flex items-center gap-3">
    <button id="add-back-btn" onclick="showView('add-method')"
            class="w-8 h-8 flex items-center justify-center rounded-2xl bg-[#f8f9fa] text-[#44474a] hover:bg-[#e8e9ea] transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h2 id="add-form-title" class="text-xl font-bold text-[#191c1d]">Add Expense</h2>
  </div>

  <!-- Recurring edit scope (only shown when confirming a due reminder) -->
  <div id="recur-scope-toggle-wrap" class="hidden">
    <div class="text-xs font-semibold text-[#44474a] dark:text-[#aaa] mb-1.5 uppercase tracking-wider">Apply changes to</div>
    <div class="flex bg-[#f8f9fa] dark:bg-[#1e1e1e] rounded-2xl p-1 gap-1">
      <button type="button" id="recur-scope-btn-once" onclick="setRecurringScope('once')"
              class="flex-1 py-2 rounded-xl text-sm font-bold transition-all">Just this time</button>
      <button type="button" id="recur-scope-btn-all" onclick="setRecurringScope('all')"
              class="flex-1 py-2 rounded-xl text-sm font-bold transition-all">This &amp; future</button>
    </div>
  </div>

  <!-- Receipt reference strip (shown only after scan) -->
  <div id="receipt-ref-strip" class="hidden">
    <button type="button" onclick="toggleReceiptRef()"
            class="w-full flex items-center justify-between px-3 py-2 bg-[#e6f4f1] rounded-2xl text-sm font-semibold text-[#006b55]">
      <span class="flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.82V15.18a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
        View original receipt
      </span>
      <svg id="receipt-ref-chevron" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </button>
    <div id="receipt-ref-panel" class="hidden mt-2 rounded-2xl overflow-hidden bg-[#edeeef] relative h-[50vh]" style="touch-action:none;">
      <img id="receipt-ref-img" src="" alt="Receipt" class="w-full h-full object-contain block"
           style="transform-origin:center center; will-change:transform; user-select:none; -webkit-user-drag:none;" />
      <div id="receipt-ref-pdf" class="hidden w-full h-full py-10 flex flex-col items-center gap-2 overflow-y-auto">
        <svg class="w-14 h-14 text-[#006b55]" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 21H5a2 2 0 01-2-2V5a2 2 0 012-2h10l4 4v12a2 2 0 01-2 2h-2"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-5h1.5a1.5 1.5 0 010 3H9m4 2v-5h2m-2 2.5h1.5M17 17v-5"/>
        </svg>
        <p id="receipt-ref-pdf-name" class="text-xs text-[#44474a] font-medium truncate max-w-xs"></p>
      </div>
      <span id="receipt-ref-hint" class="absolute bottom-2 left-2 text-[10px] text-white/90 bg-black/40 px-2 py-0.5 rounded-full pointer-events-none">Pinch to zoom</span>
    </div>
  </div>

  <!-- Expense form -->
  <form onsubmit="event.preventDefault(); saveExpense();" class="space-y-4">

    <div>
      <label id="f-merchant-label" class="block text-sm font-semibold text-[#191c1d] mb-1.5">Merchant *</label>
      <input id="f-merchant" type="text" placeholder="e.g. Lidl, McDonald's" autocomplete="off"
             class="w-full px-4 py-3 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] focus:border-transparent bg-white"
             onblur="autoClassify()" />
    </div>

    <div class="grid grid-cols-5 gap-2">
      <div class="col-span-2">
        <label class="block text-sm font-semibold text-[#191c1d] mb-1.5">Amount *</label>
        <div class="relative">
          <span id="f-cur-sym" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#44474a] text-sm font-semibold pointer-events-none">€</span>
          <input id="f-amount" type="text" inputmode="decimal" placeholder="0.00"
                 oninput="const _a=this.value.replace(/[^0-9.]/g,'').replace(/(\..*)\./g,'$1'); if(_a!==this.value)this.value=_a; checkAmountMismatch(); updateAmountConvertedHint()"
                 class="w-full pl-7 pr-3 py-3 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        </div>
        <p id="amount-mismatch-warn" class="hidden mt-1 text-xs text-amber-500 font-medium">Items total: <span id="amount-mismatch-val"></span></p>
        <p id="f-amount-converted" class="hidden mt-1 text-xs text-gray-400"></p>
      </div>
      <div class="col-span-1">
        <div class="flex items-center justify-between mb-1.5">
          <label class="text-sm font-semibold text-[#191c1d]">CCY</label>
          <button type="button" onclick="toggleInlineAddCurrency()" class="text-[10px] text-[#006b55] font-bold leading-none">+</button>
        </div>
        <select id="f-currency" onchange="updateCurrencySymbol()"
                class="w-full px-1 py-3 border border-[#c5c6ca] rounded-2xl text-xs font-bold focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white text-center"></select>
      </div>
      <div id="f-date-wrap" class="col-span-2">
        <label class="block text-sm font-semibold text-[#191c1d] mb-1.5">Date</label>
        <input id="f-date" type="date"
               class="w-full px-3 py-3 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
      </div>
      <div id="f-recur-day-wrap" class="col-span-2 hidden">
        <label class="block text-sm font-semibold text-[#191c1d] mb-1.5">Day of Month <span class="text-xs text-[#44474a] font-normal">(optional)</span></label>
        <input id="f-recur-day" type="number" inputmode="numeric" min="1" max="31" placeholder="1"
               class="w-full px-3 py-3 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
      </div>
    </div>

    <!-- Inline add currency -->
    <div id="inline-add-currency-wrap" class="hidden -mt-2">
      <div id="inline-add-currency-form" class="flex gap-2 items-center">
        <input id="icu-code" type="text" placeholder="e.g. THB" maxlength="5"
               class="w-24 px-3 py-2 border border-[#c5c6ca] rounded-xl text-sm uppercase focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white"
               oninput="this.value=this.value.toUpperCase()" />
        <button type="button" onclick="saveInlineCurrency()" class="px-3 py-2 bg-[#006b55] text-white rounded-xl text-sm font-bold">Add</button>
        <button type="button" onclick="toggleInlineAddCurrency()" class="px-2 py-2 border border-[#c5c6ca] text-[#44474a] rounded-xl text-sm">✕</button>
      </div>
    </div>

    <!-- Exchange rate row (shown only when currency ≠ default) -->
    <div id="f-rate-row" style="display:none"
         class="items-center gap-2 bg-[#f0fdf9] border border-[#6dfad2] rounded-2xl px-3 py-2.5">
      <span class="text-xs text-[#44474a] flex-shrink-0">1 <span id="f-rate-from"></span> =</span>
      <span id="f-rate-sym" class="text-xs font-semibold text-[#191c1d] flex-shrink-0"></span>
      <input id="f-rate" type="number" step="any" min="0" placeholder="0.000000"
             oninput="updateAmountConvertedHint()"
             class="flex-1 min-w-0 px-2 py-1 border border-[#6dfad2] rounded-xl text-xs text-center focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
      <span id="f-rate-note" class="text-[10px] text-emerald-500 flex-shrink-0"></span>
    </div>

    <div id="items-wrapper" class="hidden">
      <div class="flex items-center justify-between mb-2">
        <label class="text-sm font-semibold text-[#191c1d]">Items</label>
        <button type="button" onclick="addFormItem()"
                class="text-xs font-bold text-[#006b55] hover:text-[#004d3f] py-1 px-2 rounded-xl hover:bg-[#f0fdf9] transition-colors">+ Add item</button>
      </div>
      <div id="items-section">
        <div class="flex items-center gap-2 mb-1 px-1">
          <span class="flex-1 text-[10px] text-[#44474a]">Name</span>
          <span class="w-12 text-[10px] text-[#44474a] text-center">Qty</span>
          <span class="w-24 text-[10px] text-[#44474a] text-right pr-1">Price</span>
          <span class="w-7"></span>
        </div>
        <div id="items-list" class="space-y-2"></div>
      </div>
    </div>

    <div>
      <div class="flex items-center justify-between mb-2">
        <label class="text-sm font-semibold text-[#191c1d]">Category</label>
        <div class="flex items-center gap-2">
          <span id="cat-confidence" class="text-xs text-[#44474a] hidden"></span>
          <button type="button" onclick="toggleInlineAddCategory()" class="text-xs text-[#006b55] font-bold">+ Add</button>
        </div>
      </div>
      <div id="cat-buttons" class="flex flex-wrap gap-1.5">
        <div class="text-sm text-[#c5c6ca]">Loading…</div>
      </div>
      <div id="inline-add-category-form" class="hidden mt-2 flex gap-2 items-center">
        <input id="iac-emoji" type="text" placeholder="📦" maxlength="2"
               class="w-12 px-2 py-2 border border-[#c5c6ca] rounded-xl text-sm text-center focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        <input id="iac-name" type="text" placeholder="Category name"
               class="flex-1 px-3 py-2 border border-[#c5c6ca] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        <button type="button" onclick="saveInlineCategory()" class="px-3 py-2 bg-[#006b55] text-white rounded-xl text-sm font-bold">Add</button>
        <button type="button" onclick="toggleInlineAddCategory()" class="px-2 py-2 border border-[#c5c6ca] text-[#44474a] rounded-xl text-sm">✕</button>
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-[#191c1d] mb-1.5">Notes</label>
      <input id="f-notes" type="text" placeholder="Optional note"
             class="w-full px-4 py-3 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
    </div>

    <div id="f-budget-wrap">
      <div class="flex items-center justify-between mb-1.5">
        <label class="text-sm font-semibold text-[#191c1d]">Event Budget <span class="text-xs text-[#44474a] font-normal">(optional)</span></label>
        <button type="button" onclick="toggleInlineEventBudget()" class="text-xs text-[#006b55] font-bold">+ New event</button>
      </div>
      <select id="f-budget-tag"
              class="w-full px-4 py-3 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white">
        <option value="">— No event budget —</option>
      </select>
      <div id="inline-event-budget-form" class="hidden mt-2 p-3 bg-[#f8f9fa] rounded-2xl border border-[#e8e9ea] space-y-2">
        <input id="ief-name" type="text" placeholder="Event name (e.g. Trip to Thailand)"
               class="w-full px-3 py-2 border border-[#c5c6ca] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        <div class="relative">
          <span id="ief-sym" class="absolute left-3 top-1/2 -translate-y-1/2 text-[#44474a] text-sm font-semibold pointer-events-none">€</span>
          <input id="ief-amount" type="text" inputmode="decimal" placeholder="Budget limit"
                 oninput="this.value=this.value.replace(/[^0-9.]/g,'').replace(/(\..*)\./g,'$1')"
                 class="w-full pl-7 pr-3 py-2 border border-[#c5c6ca] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        </div>
        <div class="grid grid-cols-2 gap-2">
          <input id="ief-start" type="date" placeholder="Start (opt.)" class="w-full px-3 py-2 border border-[#c5c6ca] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
          <input id="ief-end" type="date" placeholder="End (opt.)" class="w-full px-3 py-2 border border-[#c5c6ca] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        </div>
        <div class="flex gap-2">
          <button type="button" onclick="saveInlineEventBudget()" class="flex-1 py-2 bg-[#006b55] text-white rounded-xl text-sm font-bold">Create & Select</button>
          <button type="button" onclick="toggleInlineEventBudget()" class="px-3 py-2 border border-[#c5c6ca] text-[#44474a] rounded-xl text-sm font-semibold">Cancel</button>
        </div>
      </div>
    </div>

    <div id="f-location-wrap">
      <label class="block text-sm font-semibold text-[#191c1d] mb-1.5">Location</label>
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#44474a] text-sm pointer-events-none">📍</span>
        <input id="f-location" type="text" placeholder="Type or tap Near me…" autocomplete="off"
               oninput="onLocationInput('f-location', 'f-nearby-results')"
               class="w-full pl-9 pr-[5.5rem] py-3 border border-[#c5c6ca] rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        <button type="button" onclick="findNearbyPlaces('f-location', 'f-nearby-results', this)"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-bold text-[#006b55] bg-[#f0fdf9] hover:bg-[#d0f5e8] px-2.5 py-1.5 rounded-xl transition-colors whitespace-nowrap">
          Near me
        </button>
      </div>
      <div id="f-nearby-results"
           class="hidden mt-1 bg-white border border-[#c5c6ca] rounded-2xl shadow-lg overflow-hidden max-h-52 overflow-y-auto"></div>
    </div>

    <div>
      <div class="flex items-center justify-between mb-1.5">
        <label class="text-sm font-semibold text-[#191c1d]">Payment Method</label>
        <button type="button" onclick="toggleInlineAddPayment()" class="text-xs text-[#006b55] font-bold">+ Add</button>
      </div>
      <div id="payment-buttons" class="flex flex-wrap gap-1.5"></div>
      <div id="inline-add-payment-form" class="hidden mt-2 flex gap-2 items-center">
        <input id="iap-emoji" type="text" placeholder="💳" maxlength="2"
               class="w-12 px-2 py-2 border border-[#c5c6ca] rounded-xl text-sm text-center focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        <input id="iap-name" type="text" placeholder="e.g. Revolut"
               class="flex-1 px-3 py-2 border border-[#c5c6ca] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006b55] bg-white" />
        <button type="button" onclick="saveInlinePayment()" class="px-3 py-2 bg-[#006b55] text-white rounded-xl text-sm font-bold">Add</button>
        <button type="button" onclick="toggleInlineAddPayment()" class="px-2 py-2 border border-[#c5c6ca] text-[#44474a] rounded-xl text-sm">✕</button>
      </div>
    </div>

    <button type="submit" id="save-btn"
            class="w-full py-4 bg-[#006b55] hover:bg-[#004d3f] active:bg-[#003d31] text-white rounded-3xl font-bold text-base transition-colors flex items-center justify-center gap-2 shadow-sm">
      <span id="save-label">Add Expense</span>
      <span id="save-spinner" class="hidden loader"></span>
    </button>
  </form>
</div>
