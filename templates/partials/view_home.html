<!-- ── HOME VIEW ─────────────────────────────────────────────────────── -->
<div id="view-home" class="view active p-4 space-y-3 fade-in">

  <!-- Greeting -->
  <div class="pt-1 pb-0.5">
    <div class="text-lg font-bold text-[#191c1d]">Hi there 👋</div>
    <div class="text-xs text-[#44474a] mt-0.5">Here's your spending overview</div>
  </div>

  <!-- ── Budget Card ─────────────────────────────────────────────────── -->
  <div class="bg-white rounded-3xl p-5 border border-[#e8e9ea] shadow-sm">
    <!-- Header row -->
    <div class="flex items-start justify-between mb-2">
      <div class="text-sm font-semibold text-[#44474a]">Total Spent This Month</div>
      <div id="home-trend-badge" class="hidden px-3 py-1 rounded-full text-xs font-bold"></div>
    </div>
    <!-- Amount -->
    <div id="home-month" class="text-4xl font-bold text-[#191c1d] tracking-tight">—</div>
  </div>

  <!-- ── Budget Progress + Today / This Week / Left ─────────────────── -->
  <div class="bg-white rounded-3xl p-5 border border-[#e8e9ea] shadow-sm">
    <!-- Quick budget edit (hidden until triggered) -->
    <div id="home-budget-edit" class="hidden mb-3">
      <div class="flex gap-2 items-center">
        <input type="number" id="home-budget-input" min="0" step="any" placeholder="New monthly budget"
               class="flex-1 border border-[#e8e9ea] rounded-xl px-3 py-2 text-sm bg-[#f8f9fa] focus:outline-none focus:border-[#006b55]" />
        <button onclick="saveHomeBudget()" class="bg-[#006b55] text-white rounded-xl px-4 py-2 text-sm font-bold whitespace-nowrap">Set</button>
        <button onclick="toggleBudgetEdit()" class="border border-[#e8e9ea] text-[#44474a] rounded-xl px-4 py-2 text-sm font-bold whitespace-nowrap">Cancel</button>
      </div>
    </div>
    <!-- Shown when no budget is set -->
    <button id="home-no-budget-btn" onclick="toggleBudgetEdit()" class="hidden text-sm text-[#006b55] font-bold mb-3">+ Set a monthly budget</button>

    <!-- Budget progress (hidden when no budget set) -->
    <div id="home-budget-section" class="hidden">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-bold text-[#191c1d]">Budget Progress</span>
        <div class="flex items-center gap-3">
          <span id="home-budget-pct" class="text-sm font-bold text-[#191c1d]">0% used</span>
          <button onclick="toggleBudgetEdit()" class="text-xs text-[#006b55] font-bold underline underline-offset-2">Edit</button>
        </div>
      </div>
      <div class="h-3 bg-[#edeeef] rounded-full overflow-hidden mb-2.5">
        <div id="home-budget-bar" class="h-full rounded-full budget-bar-fill" style="width:0%;background:#006b55;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)"></div>
      </div>
      <div class="flex items-center justify-between mb-4">
        <span id="home-budget-limit" class="text-xs text-[#44474a]"></span>
        <span id="home-budget-remaining" class="text-xs font-bold text-[#006b55]"></span>
      </div>
      <div class="border-t border-[#edeeef] mb-4"></div>
    </div>

    <!-- Three mini stats -->
    <div class="grid grid-cols-3 gap-3">
      <div>
        <div class="text-[10px] font-bold text-[#44474a] uppercase tracking-wider mb-1.5">Today</div>
        <div id="home-today" class="text-lg font-bold text-[#191c1d]">—</div>
      </div>
      <div>
        <div class="text-[10px] font-bold text-[#44474a] uppercase tracking-wider mb-1.5">This Week</div>
        <div id="home-week" class="text-lg font-bold text-[#191c1d]">—</div>
      </div>
      <div>
        <div class="text-[10px] font-bold text-[#44474a] uppercase tracking-wider mb-1.5">Left</div>
        <div id="home-left" class="text-lg font-bold text-[#006b55]">—</div>
      </div>
    </div>
  </div>

  <!-- ── Income / Net Balance card (hidden when no income this month) ── -->
  <div id="home-income-card" class="hidden bg-white rounded-3xl p-5 border border-[#e8e9ea] shadow-sm">
    <div class="text-sm font-semibold text-[#44474a] mb-3">Monthly Balance</div>
    <div class="grid grid-cols-3 gap-3">
      <div>
        <div class="text-[10px] font-bold text-[#44474a] uppercase tracking-wider mb-1">Income</div>
        <div id="home-month-income" class="text-base font-bold text-[#16a34a]">—</div>
      </div>
      <div>
        <div class="text-[10px] font-bold text-[#44474a] uppercase tracking-wider mb-1">Expenses</div>
        <div id="home-month-expense" class="text-base font-bold text-[#191c1d]">—</div>
      </div>
      <div>
        <div class="text-[10px] font-bold text-[#44474a] uppercase tracking-wider mb-1">Net</div>
        <div id="home-net-balance" class="text-base font-bold">—</div>
      </div>
    </div>
  </div>

  <!-- 7-day bar chart -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-3">7-Day Spending</div>
    <div id="chart-bars" class="flex items-end gap-1.5 h-20"></div>
    <div id="chart-labels" class="flex gap-1.5 mt-1.5"></div>
  </div>

  <!-- Category breakdown -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-3">This Month by Category</div>
    <div id="home-categories" class="space-y-2.5">
      <div class="text-sm text-[#c5c6ca] text-center py-3">No spending this month</div>
    </div>
  </div>

  <!-- Pending Scans (hidden when empty) -->
  <div id="home-pending-scans" class="hidden bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm">
    <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider mb-3">Processing</div>
    <div id="pending-scans-list" class="space-y-2.5"></div>
  </div>

  <!-- Recent expenses -->
  <div class="bg-white rounded-3xl p-4 border border-[#e8e9ea] shadow-sm">
    <div class="flex items-center justify-between mb-3">
      <div class="text-xs font-semibold text-[#44474a] uppercase tracking-wider">Recent</div>
      <button onclick="showView('history')" class="text-xs text-[#006b55] font-bold">See all →</button>
    </div>
    <div id="home-recent" class="space-y-2">
      <div class="text-sm text-[#c5c6ca] text-center py-3">No expenses yet</div>
    </div>
  </div>
</div>
