<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flo — Sign in</title>
  <!-- Set dark mode before styles to avoid flash -->
  <script>if (localStorage.getItem('darkMode') !== '0') document.documentElement.classList.add('dark');</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="bg-[#d0d5d4] flo-phone-bg">

<div class="w-full max-w-[430px] mx-auto bg-[#f8f9fa] dark:bg-[#191c1d] flex flex-col items-center justify-center relative"
     style="height: 100%; max-height: 900px; min-height: 100vh;">

  <div class="w-full px-8 flex flex-col items-center">

    <!-- Brand -->
    <div class="w-16 h-16 bg-[#006b55] rounded-3xl flex items-center justify-center shadow-md mb-5">
      <svg class="w-9 h-9" fill="none" stroke="#6dfad2" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-[#191c1d] dark:text-white tracking-tight">Flo</h1>
    <p class="text-sm text-[#5f6368] dark:text-[#a0a4a8] mt-1 mb-8">Enter your password to continue</p>

    <!-- Login form -->
    <form method="POST" action="/login" class="w-full flex flex-col gap-4">
      {% if error %}
      <div class="text-sm text-red-700 bg-red-100 border border-red-200 rounded-xl px-4 py-3">
        {{ error }}
      </div>
      {% endif %}

      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-sm font-medium text-[#191c1d] dark:text-[#e0e2e4]">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          autofocus
          required
          class="w-full px-4 py-3 rounded-xl border border-[#d0d5d4] dark:border-[#3a3d3e] bg-white dark:bg-[#26292b] text-[#191c1d] dark:text-white focus:outline-none focus:ring-2 focus:ring-[#006b55] focus:border-transparent"
          placeholder="••••••••" />
      </div>

      <button
        type="submit"
        class="w-full bg-[#006b55] hover:bg-[#005544] text-white font-semibold py-3 rounded-xl shadow-sm transition-colors">
        Sign in
      </button>
    </form>

    <p class="text-xs text-[#9aa0a6] mt-8 text-center">Authorized access only.</p>
  </div>

</div>

</body>
</html>
