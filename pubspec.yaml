name: personal_finance_tracker
description: A basic personal finance app for tracking expenses on iOS and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.7
  http: ^1.5.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
